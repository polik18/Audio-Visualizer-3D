<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 音樂視覺化與 MP4 導出工具 (加強版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-purple-500 selection:text-white">

    <!-- 拖曳上傳遮罩 (縮小為彈出視窗並加入關閉按鈕) -->
    <div id="drop-zone" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="relative bg-gray-900 border-2 border-dashed border-purple-500 rounded-3xl w-11/12 max-w-lg p-10 flex flex-col items-center shadow-2xl shadow-purple-500/20">
            <button id="close-drop-zone" class="absolute top-4 right-4 text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 rounded-full p-2 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <svg class="w-20 h-20 text-purple-400 mb-6 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <h2 class="text-3xl font-bold text-white mb-3 text-center">拖曳 MP3 或底圖至此處</h2>
            <p class="text-gray-400 text-center text-sm">放開滑鼠即可自動載入音樂或更換底圖</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div class="relative z-10 flex flex-col h-screen justify-between p-6 pointer-events-none">
        <header class="flex justify-between items-start pointer-events-auto">
            <div class="flex flex-col gap-4">
                <div class="glass-panel rounded-2xl p-4 max-w-md">
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">Audio Visualizer 3D</h1>
                    <p class="text-xs text-gray-300 mt-1 mb-3">直接拖曳 MP3 或底圖至此，並導出您的特效影片</p>
                </div>
                
                <div id="status-box" class="glass-panel rounded-xl px-4 py-2 text-sm text-yellow-300 hidden transition-opacity duration-300 w-fit">
                    狀態：準備中...
                </div>
            </div>

            <div class="flex flex-col items-end gap-2">
                <div class="glass-panel rounded-xl p-3 flex flex-col gap-2 w-72 shadow-lg">
                    <!-- 改為多行 textarea -->
                    <textarea id="lyrics-input" rows="2" placeholder="輸入歌名或歌詞...&#10;(Shift+Enter 換行, Enter 送出)" class="w-full bg-black/50 text-white rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 placeholder-gray-400 resize-none"></textarea>
                </div>
                <div class="glass-panel rounded-xl p-3 text-xs text-gray-300 w-72 space-y-1.5 shadow-lg">
                    <p class="font-bold text-white mb-1 border-b border-white/20 pb-1">操作說明</p>
                    <p class="flex justify-between"><span><kbd class="bg-gray-800 px-1 rounded border border-gray-600">空白鍵</kbd></span> <span>切換自動/手動</span></p>
                    <p class="flex justify-between items-center text-[10px]">
                        <span><kbd class="bg-gray-800 px-1 rounded border border-gray-600">1</kbd>~<kbd class="bg-gray-800 px-1 rounded border border-gray-600">0</kbd> <kbd class="bg-gray-800 px-1 rounded border border-gray-600">-</kbd> <kbd class="bg-gray-800 px-1 rounded border border-gray-600">=</kbd> <kbd class="bg-gray-800 px-1 rounded border border-gray-600">[</kbd></span> 
                        <span>指定切換場景 1~13</span>
                    </p>
                    <p class="flex justify-between"><span><kbd class="bg-gray-800 px-1 rounded border border-gray-600">↑</kbd> / <kbd class="bg-gray-800 px-1 rounded border border-gray-600">↓</kbd></span> <span>特效強度 (至500%)</span></p>
                    <p class="flex justify-between"><span><kbd class="bg-gray-800 px-1 rounded border border-gray-600">W</kbd> / <kbd class="bg-gray-800 px-1 rounded border border-gray-600">S</kbd></span> <span>模擬速度 (BPM)</span></p>
                    <p class="flex justify-between items-center text-[10px] mt-1 pt-1 border-t border-white/20">
                        <span><kbd class="bg-gray-800 px-1 rounded border border-gray-600">滑鼠拖曳</kbd> / <kbd class="bg-gray-800 px-1 rounded border border-gray-600">雙擊</kbd></span> 
                        <span>移動 / 重置特效中心</span>
                    </p>
                </div>
            </div>
        </header>

        <footer class="flex justify-center pointer-events-auto mb-4">
            <div class="glass-panel rounded-3xl p-4 flex items-center gap-6 shadow-2xl">
                
                <label class="cursor-pointer group flex flex-col items-center gap-1 transition-transform hover:scale-105 active:scale-95">
                    <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-purple-500/50 transition-colors">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <span class="text-xs font-medium">本機 MP3</span>
                    <input type="file" id="audio-upload" accept="audio/mp3, audio/wav">
                </label>

                <div class="w-px h-10 bg-white/20"></div>

                <!-- 上傳底圖按鈕 -->
                <label class="cursor-pointer group flex flex-col items-center gap-1 transition-transform hover:scale-105 active:scale-95">
                    <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-blue-500/50 transition-colors relative">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <button id="remove-bg-btn" class="hidden absolute -top-1 -right-1 bg-red-500 rounded-full w-5 h-5 flex items-center justify-center text-[12px] font-bold shadow-lg hover:bg-red-400 z-10 transition-transform hover:scale-110" title="移除底圖">✕</button>
                    </div>
                    <span class="text-xs font-medium">上傳底圖</span>
                    <input type="file" id="bg-upload" accept="image/*">
                </label>

                <div class="w-px h-10 bg-white/20"></div>

                <!-- 模擬播放按鈕 -->
                <button id="sim-btn" class="cursor-pointer group flex flex-col items-center gap-1 transition-transform hover:scale-105 active:scale-95">
                    <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-purple-500/50 transition-colors">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                    <span class="text-xs font-medium">無音樂模擬</span>
                </button>

                <div class="w-px h-10 bg-white/20"></div>

                <button id="play-btn" class="cursor-pointer group flex flex-col items-center gap-1 transition-transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <div class="w-14 h-14 rounded-full bg-white text-black flex items-center justify-center group-hover:bg-gray-200 transition-colors shadow-lg">
                        <svg id="play-icon" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        <svg id="pause-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    </div>
                    <span id="play-text" class="text-xs font-medium">播放</span>
                </button>

                <div class="w-px h-10 bg-white/20"></div>

                <button id="record-btn" class="cursor-pointer group flex flex-col items-center gap-1 transition-transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <div id="record-circle" class="w-12 h-12 rounded-full border-2 border-red-500 flex items-center justify-center transition-all">
                        <div id="record-inner" class="w-4 h-4 rounded-full bg-red-500 transition-all"></div>
                    </div>
                    <span id="record-text" class="text-xs font-medium text-red-400">開始錄製</span>
                </button>

            </div>
        </footer>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[200] hidden flex-col items-center justify-center backdrop-blur-sm">
        <svg class="animate-spin -ml-1 mr-3 h-12 w-12 text-purple-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-2xl font-bold text-white mb-2">正在處理影片...</h2>
        <p id="loading-text" class="text-gray-400 text-sm">正在使用 FFmpeg 轉碼為 MP4，這可能需要幾分鐘的時間，請勿關閉視窗。</p>
    </div>

    <script>
        // ==========================================
        // 1. 核心狀態管理
        // ==========================================
        const state = {
            audioContext: null,
            analyser: null,
            source: null,
            audioBuffer: null,
            dataArray: new Uint8Array(512), 
            isPlaying: false,
            isRecording: false,
            currentScene: 0,
            bassHitTimer: 0,
            hueOffset: 0,
            isAutoMode: true,
            effectIntensity: 1.0,
            
            isSimulationMode: false,
            bpm: 120,
            
            // 時間與歌詞滾動狀態
            audioStartTime: 0,
            audioDuration: 0,
            simTime: 0,
            currentProgress: 0,
            lastRenderedProgress: -1,
            
            parsedLyrics: null,
            textDirty: false
        };

        const sceneNames = [
            '深空星塵', '幾何脈動', '音軌隧道', '頻譜光環', '音浪地形',
            '放射光芒', '霓虹螺旋', '方塊矩陣', '星際陀螺儀', '星爆射線',
            '扭曲空間', '粒子漩渦', '全息光碟'
        ];

        const ui = {
            upload: document.getElementById('audio-upload'),
            bgUpload: document.getElementById('bg-upload'),
            removeBgBtn: document.getElementById('remove-bg-btn'),
            playBtn: document.getElementById('play-btn'),
            playIcon: document.getElementById('play-icon'),
            pauseIcon: document.getElementById('pause-icon'),
            playText: document.getElementById('play-text'),
            recordBtn: document.getElementById('record-btn'),
            recordCircle: document.getElementById('record-circle'),
            recordInner: document.getElementById('record-inner'),
            recordText: document.getElementById('record-text'),
            statusBox: document.getElementById('status-box'),
            loadingOverlay: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text'),
            lyricsInput: document.getElementById('lyrics-input'),
            dropZone: document.getElementById('drop-zone'),
            closeDropZone: document.getElementById('close-drop-zone'),
            simBtn: document.getElementById('sim-btn')
        };

        function showStatus(text, duration = 3000) {
            ui.statusBox.textContent = text;
            ui.statusBox.classList.remove('hidden');
            setTimeout(() => ui.statusBox.classList.add('hidden'), duration);
        }

        // ==========================================
        // 3. Three.js 核心環境建置 
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff00ff, 1, 200);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // 畫布文字精靈 (動態滾動版)
        const textCanvas = document.createElement('canvas');
        textCanvas.width = 2048; 
        textCanvas.height = 1024; 
        const textCtx = textCanvas.getContext('2d');
        const textTexture = new THREE.CanvasTexture(textCanvas);
        
        const textMaterial = new THREE.SpriteMaterial({ map: textTexture, transparent: true, depthTest: false });
        const textSprite = new THREE.Sprite(textMaterial);
        textSprite.renderOrder = 999; // 確保文字在最頂層
        textSprite.scale.set(100, 50, 1); 
        textSprite.position.set(0, 0, 10); 
        scene.add(textSprite);

        // 解析並排版輸入的歌詞資料
        function parseLyrics(text) {
            if(text.trim() === '') {
                state.parsedLyrics = null;
                state.textDirty = true;
                return;
            }

            const fontSize = 60; // 歌詞預設字體大小
            const titleFontSize = 90; // 首行歌名字體大小
            const maxWidth = textCanvas.width * 0.85; 
            const lineHeightFactor = 1.4; 

            const originalLines = text.split('\n');
            const titleStr = originalLines[0] || '';
            const lyricsStrs = originalLines.slice(1);

            const parsedLines = [];
            let currentOffsetY = 0;

            // 文字自動換行運算
            function wrapText(str, size, isTitle) {
                textCtx.font = `bold ${size}px 'Segoe UI', sans-serif`;
                let currentLine = '';
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const testLine = currentLine + char;
                    if (textCtx.measureText(testLine).width > maxWidth && currentLine !== '') {
                        parsedLines.push({ text: currentLine, size: size, isTitle: isTitle, offsetY: currentOffsetY });
                        currentOffsetY += size * lineHeightFactor;
                        currentLine = char;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine !== '') {
                    parsedLines.push({ text: currentLine, size: size, isTitle: isTitle, offsetY: currentOffsetY });
                    currentOffsetY += size * lineHeightFactor;
                }
            }

            // 1. 處理標題
            if (titleStr) {
                wrapText(titleStr, titleFontSize, true);
                currentOffsetY += 30; // 標題與歌詞間的留白
            }

            // 2. 處理歌詞 (保留空行段落)
            for (const line of lyricsStrs) {
                if (line.trim() === '') {
                    currentOffsetY += fontSize * lineHeightFactor; // 保留空行高度
                    continue;
                }
                wrapText(line, fontSize, false);
            }

            // 調整對齊點至每一行的垂直中心
            parsedLines.forEach(line => {
                line.offsetY += (line.size * lineHeightFactor) / 2;
            });

            state.parsedLyrics = {
                lines: parsedLines,
                totalHeight: currentOffsetY
            };
            state.textDirty = true;
        }

        // 根據播放進度繪製歌詞 (動態滾動與效能優化)
        function renderVisibleLyrics(progress) {
            textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            
            if (!state.parsedLyrics || state.parsedLyrics.lines.length === 0) {
                textTexture.needsUpdate = true;
                return;
            }

            const canvasCenterY = textCanvas.height / 2;
            let baseStartY = 0;

            if (state.parsedLyrics.totalHeight <= textCanvas.height * 0.8) {
                // 如果文字總長度沒有超過畫面，直接置中顯示，不滾動
                baseStartY = (textCanvas.height - state.parsedLyrics.totalHeight) / 2;
            } else {
                // 智慧滾動邏輯：從第一行在畫面中央，隨著進度平滑移動，直到最後一行落在畫面中央
                const startScroll = canvasCenterY; 
                const endScroll = canvasCenterY - state.parsedLyrics.totalHeight;
                baseStartY = startScroll + (endScroll - startScroll) * progress;
            }

            textCtx.fillStyle = "white";
            textCtx.textAlign = "center";
            textCtx.textBaseline = "middle";
            textCtx.shadowColor = "white";

            // 繪製每一行 (利用視窗裁剪：僅繪製在畫布範圍內的文字，節省效能)
            for (const line of state.parsedLyrics.lines) {
                const y = baseStartY + line.offsetY;
                
                if (y > -150 && y < textCanvas.height + 150) {
                    textCtx.font = `bold ${line.size}px 'Segoe UI', sans-serif`;
                    textCtx.shadowBlur = line.size * 0.3;
                    textCtx.fillText(line.text, textCanvas.width / 2, y);
                }
            }
            
            textTexture.needsUpdate = true;
        }

        // 監聽 Enter 送出 (Shift+Enter 換行)
        ui.lyricsInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                parseLyrics(e.target.value);
                e.target.blur(); 
                showStatus('歌詞已載入，將隨播放進度滾動');
            }
        });
        ui.lyricsInput.addEventListener('blur', (e) => parseLyrics(e.target.value));

        // 建立特效主群組 (用於拖曳中心點)
        const masterGroup = new THREE.Group();
        scene.add(masterGroup);

        // 建立所有 13 種幾何模型群組 
        const groups = [];
        for(let i=0; i<13; i++) {
            const group = new THREE.Group();
            group.visible = false;
            masterGroup.add(group);
            groups.push(group);
        }
        
        // [0] 深空星塵
        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(6000 * 3);
        for(let i = 0; i < 6000; i++) { 
            posArray[i*3] = (Math.random()-0.5)*200; 
            posArray[i*3+1] = (Math.random()-0.5)*200; 
            posArray[i*3+2] = (Math.random()-0.5)*200; 
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.5, color: 0x88ccff, transparent: true, opacity: 0.8 });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        groups[0].add(particlesMesh); 
        groups[0].visible = true; // 預設顯示

        // [1] 幾何脈動
        const icosahedronMaterial = new THREE.MeshStandardMaterial({ color: 0xaa00ff, wireframe: true, emissive: 0x330055, emissiveIntensity: 0.5 });
        const icosahedronMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(15, 2), icosahedronMaterial);
        groups[1].add(icosahedronMesh);

        // [2] 音軌隧道
        const rings = [];
        const ringsCount = 30;
        for(let i = 0; i < ringsCount; i++) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(20, 0.5, 8, 50), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0 }));
            ring.position.z = -i * 10;
            rings.push(ring);
            groups[2].add(ring);
        }

        // [3] 頻譜光環
        const spectrumBars = [];
        for(let i = 0; i < 64; i++) {
            const bar = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x004433}));
            const angle = (i / 64) * Math.PI * 2;
            bar.position.set(Math.cos(angle)*20, Math.sin(angle)*20, 0);
            bar.rotation.z = angle;
            spectrumBars.push(bar);
            groups[3].add(bar);
        }

        // [4] 音浪地形
        const terrainGeo = new THREE.PlaneGeometry(80, 80, 32, 32);
        const terrainMat = new THREE.MeshStandardMaterial({color: 0xff00ff, wireframe: true, emissive: 0x220044});
        const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        terrainMesh.rotation.x = -Math.PI / 2.5;
        terrainMesh.position.y = -15;
        groups[4].add(terrainMesh);

        // [5] 放射光芒
        const spikes = [];
        groups[5].add(new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe:true})));
        for(let i = 0; i < 40; i++) {
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.8, 12, 4), new THREE.MeshStandardMaterial({color: 0xffaa00}));
            const phi = Math.acos(-1 + (2 * i) / 40);
            const theta = Math.sqrt(40 * Math.PI) * phi;
            spike.position.setFromSphericalCoords(4, phi, theta);
            spike.lookAt(0,0,0);
            spikes.push(spike);
            groups[5].add(spike);
        }

        // [6] 霓虹螺旋
        const helixSpheres = [];
        for(let i = 0; i < 120; i++) {
            const mat = new THREE.MeshStandardMaterial({color: 0x00ff00, emissive: 0x005500});
            const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), mat);
            const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), mat);
            const y = (i - 60) * 0.8;
            const angle = i * 0.2;
            s1.position.set(Math.cos(angle)*8, y, Math.sin(angle)*8);
            s2.position.set(Math.cos(angle+Math.PI)*8, y, Math.sin(angle+Math.PI)*8);
            helixSpheres.push(s1, s2);
            groups[6].add(s1); groups[6].add(s2);
        }

        // [7] 方塊矩陣
        const matrixCubes = [];
        for(let x=-2; x<=2; x++) {
            for(let y=-2; y<=2; y++) {
                for(let z=-2; z<=2; z++) {
                    const cube = new THREE.Mesh(new THREE.BoxGeometry(2.5,2.5,2.5), new THREE.MeshBasicMaterial({color: 0x00ffff, wireframe:true}));
                    cube.position.set(x*8, y*8, z*8);
                    matrixCubes.push(cube);
                    groups[7].add(cube);
                }
            }
        }

        // [8] 星際陀螺儀
        const gyroRings = [];
        for(let i = 0; i < 5; i++) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(8 + i*4, 0.4, 16, 64), new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x333333, wireframe: i%2===0}));
            gyroRings.push(ring);
            groups[8].add(ring);
        }

        // [9] 星爆射線
        const starburstGeo = new THREE.BufferGeometry();
        const sbPositions = new Float32Array(200 * 2 * 3);
        const sbColors = new Float32Array(200 * 2 * 3);
        for(let i=0; i<200; i++) {
            sbPositions[i*6] = 0; sbPositions[i*6+1] = 0; sbPositions[i*6+2] = 0;
            const theta = Math.random() * 2.0 * Math.PI; 
            const phi = Math.acos(2.0 * Math.random() - 1.0);
            sbPositions[i*6+3] = 20 * Math.sin(phi) * Math.cos(theta);
            sbPositions[i*6+4] = 20 * Math.sin(phi) * Math.sin(theta);
            sbPositions[i*6+5] = 20 * Math.cos(phi);
            sbColors[i*6] = 1; sbColors[i*6+1] = 1; sbColors[i*6+2] = 1;
            sbColors[i*6+3] = 1; sbColors[i*6+4] = 0; sbColors[i*6+5] = 1;
        }
        starburstGeo.setAttribute('position', new THREE.BufferAttribute(sbPositions, 3));
        starburstGeo.setAttribute('color', new THREE.BufferAttribute(sbColors, 3));
        const starburstLines = new THREE.LineSegments(starburstGeo, new THREE.LineBasicMaterial({vertexColors: true, transparent: true, opacity: 0.8}));
        groups[9].add(starburstLines);

        // [10] 扭曲空間
        const knotMesh = new THREE.Mesh(new THREE.TorusKnotGeometry(12, 3, 150, 20), new THREE.MeshStandardMaterial({color: 0xff0055, emissive: 0x330011, wireframe: true}));
        groups[10].add(knotMesh);

        // [11] 粒子漩渦
        const vortexGeo = new THREE.BufferGeometry();
        const vPos = new Float32Array(3000 * 3);
        for(let i=0; i<3000; i++) {
            const y = (Math.random() - 0.5) * 80;
            const radius = 3 + (y + 40) * 0.4 + Math.random()*3;
            const angle = Math.random() * Math.PI * 2;
            vPos[i*3] = Math.cos(angle) * radius;
            vPos[i*3+1] = y;
            vPos[i*3+2] = Math.sin(angle) * radius;
        }
        vortexGeo.setAttribute('position', new THREE.BufferAttribute(vPos, 3));
        const vortexMesh = new THREE.Points(vortexGeo, new THREE.PointsMaterial({size: 0.4, color: 0x00ffcc, transparent: true, opacity: 0.6}));
        groups[11].add(vortexMesh);

        // [12] 全息光碟
        const discs = [];
        for(let i=0; i<8; i++) {
            const disc = new THREE.Mesh(new THREE.RingGeometry(6, 18, 32), new THREE.MeshBasicMaterial({color: 0xffaa00, wireframe: true, side: THREE.DoubleSide, transparent: true, opacity: 0.5}));
            disc.rotation.x = Math.PI / 2;
            disc.position.y = (i - 3.5) * 4;
            discs.push(disc);
            groups[12].add(disc);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 滑鼠/觸控拖曳控制特效中心
        // ==========================================
        const dragControl = {
            isDragging: false,
            prevX: 0,
            prevY: 0,
            targetX: 0,
            targetY: 0
        };

        container.addEventListener('mousedown', (e) => {
            dragControl.isDragging = true;
            dragControl.prevX = e.clientX;
            dragControl.prevY = e.clientY;
        });

        container.addEventListener('mousemove', (e) => {
            if (!dragControl.isDragging) return;
            const deltaX = e.clientX - dragControl.prevX;
            const deltaY = e.clientY - dragControl.prevY;
            dragControl.prevX = e.clientX;
            dragControl.prevY = e.clientY;

            dragControl.targetX += deltaX * 0.1;
            dragControl.targetY -= deltaY * 0.1;
            
            dragControl.targetX = Math.max(-100, Math.min(100, dragControl.targetX));
            dragControl.targetY = Math.max(-100, Math.min(100, dragControl.targetY));
        });

        container.addEventListener('mouseup', () => dragControl.isDragging = false);
        container.addEventListener('mouseleave', () => dragControl.isDragging = false);
        container.addEventListener('dblclick', () => {
            dragControl.targetX = 0;
            dragControl.targetY = 0;
            showStatus('特效中心已重置');
        });

        container.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                dragControl.isDragging = true;
                dragControl.prevX = e.touches[0].clientX;
                dragControl.prevY = e.touches[0].clientY;
            }
        });
        container.addEventListener('touchmove', (e) => {
            if (!dragControl.isDragging || e.touches.length === 0) return;
            const deltaX = e.touches[0].clientX - dragControl.prevX;
            const deltaY = e.touches[0].clientY - dragControl.prevY;
            dragControl.prevX = e.touches[0].clientX;
            dragControl.prevY = e.touches[0].clientY;

            dragControl.targetX += deltaX * 0.1;
            dragControl.targetY -= deltaY * 0.1;
            
            dragControl.targetX = Math.max(-100, Math.min(100, dragControl.targetX));
            dragControl.targetY = Math.max(-100, Math.min(100, dragControl.targetY));
        });
        container.addEventListener('touchend', () => dragControl.isDragging = false);


        function switchScene(sceneIndex) {
            state.currentScene = sceneIndex;
            groups.forEach((g, idx) => g.visible = (idx === sceneIndex));
            camera.position.set(0, 0, 50); camera.rotation.set(0, 0, 0);
            showStatus(`場景切換: ${sceneNames[sceneIndex]}`);
        }

        // ==========================================
        // 4. 音訊處理 (本機 MP3 邏輯) 與 控制
        // ==========================================
        async function handleAudioFile(file) {
            if (!file || !file.type.startsWith('audio/')) return showStatus('請上傳有效的音訊檔案');
            
            state.isSimulationMode = false;
            state.currentProgress = 0;
            
            showStatus('讀取音訊中...');
            ui.playBtn.disabled = true; ui.recordBtn.disabled = true;
            const arrayBuffer = await file.arrayBuffer();
            if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (state.audioContext.state === 'suspended') await state.audioContext.resume();

            state.audioContext.decodeAudioData(arrayBuffer, (buffer) => {
                state.audioBuffer = buffer;
                showStatus('載入完成，請點擊播放！');
                ui.playBtn.disabled = false; ui.recordBtn.disabled = false;
            });
        }

        function handleBgFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const url = URL.createObjectURL(file);
            textureLoader.load(url, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                scene.background = texture;
                ui.removeBgBtn.classList.remove('hidden');
                showStatus('底圖已更新');
            });
        }

        ui.upload.addEventListener('change', (e) => e.target.files.length && handleAudioFile(e.target.files[0]));
        
        const textureLoader = new THREE.TextureLoader();
        ui.bgUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleBgFile(e.target.files[0]);
        });

        ui.removeBgBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            scene.background = null;
            ui.bgUpload.value = '';
            ui.removeBgBtn.classList.add('hidden');
            showStatus('底圖已移除');
        });

        window.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            ui.dropZone.classList.remove('hidden'); 
        });
        window.addEventListener('dragleave', (e) => { 
            if(e.clientX === 0 && e.clientY === 0) {
                ui.dropZone.classList.add('hidden'); 
            }
        });
        window.addEventListener('drop', (e) => { 
            e.preventDefault(); 
            ui.dropZone.classList.add('hidden'); 
            if (e.dataTransfer.files.length) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('audio/')) {
                    handleAudioFile(file);
                } else if (file.type.startsWith('image/')) {
                    handleBgFile(file);
                } else {
                    showStatus('不支援的檔案格式，請拖曳 MP3 或圖片');
                }
            } 
        });
        
        ui.closeDropZone.addEventListener('click', () => {
            ui.dropZone.classList.add('hidden');
        });

        ui.simBtn.addEventListener('click', () => {
            stopAudio();
            state.isSimulationMode = true;
            ui.playBtn.disabled = false;
            ui.recordBtn.disabled = false;
            playAudio();
            showStatus('模擬模式已開啟，可按 W/S 調整快慢');
        });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement === ui.lyricsInput) return;

            switch(e.code) {
                case 'Space': e.preventDefault(); state.isAutoMode = !state.isAutoMode; showStatus(state.isAutoMode ? '自動模式開啟' : '手動模式開啟'); break;
                case 'ArrowRight': e.preventDefault(); state.isAutoMode = false; switchScene((state.currentScene + 1) % 13); break;
                case 'ArrowLeft': e.preventDefault(); state.isAutoMode = false; switchScene((state.currentScene - 1 + 13) % 13); break;
                case 'ArrowUp': e.preventDefault(); state.effectIntensity = Math.min(5.0, state.effectIntensity + 0.2); showStatus(`特效強度: ${Math.round(state.effectIntensity * 100)}%`); break;
                case 'ArrowDown': e.preventDefault(); state.effectIntensity = Math.max(0.2, state.effectIntensity - 0.2); showStatus(`特效強度: ${Math.round(state.effectIntensity * 100)}%`); break;
                case 'KeyW': e.preventDefault(); state.bpm = Math.min(300, state.bpm + 5); showStatus(`模擬速度: ${state.bpm} BPM`); break;
                case 'KeyS': e.preventDefault(); state.bpm = Math.max(40, state.bpm - 5); showStatus(`模擬速度: ${state.bpm} BPM`); break;
            }

            if (e.code.startsWith('Digit')) {
                const digit = parseInt(e.code.replace('Digit', ''));
                const sceneIndex = digit === 0 ? 9 : digit - 1; 
                e.preventDefault(); state.isAutoMode = false; switchScene(sceneIndex);
            } else if (e.code === 'Minus') {
                e.preventDefault(); state.isAutoMode = false; switchScene(10);
            } else if (e.code === 'Equal') {
                e.preventDefault(); state.isAutoMode = false; switchScene(11);
            } else if (e.code === 'BracketLeft') {
                e.preventDefault(); state.isAutoMode = false; switchScene(12);
            }
        });

        function playAudio() {
            if (state.isPlaying) return;
            if (state.isSimulationMode) {
                state.isPlaying = true;
                state.simTime = 0; // 重置模擬進度
                ui.playIcon.classList.add('hidden'); ui.pauseIcon.classList.remove('hidden'); 
                ui.playText.textContent = '暫停模擬';
                return;
            }
            
            state.source = state.audioContext.createBufferSource();
            state.source.buffer = state.audioBuffer;
            state.analyser = state.audioContext.createAnalyser();
            state.analyser.fftSize = 512;
            state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
            state.mediaStreamDestination = state.audioContext.createMediaStreamDestination();
            state.source.connect(state.analyser);
            state.analyser.connect(state.audioContext.destination);
            state.analyser.connect(state.mediaStreamDestination);
            
            // 記錄開始時間與總時長以供歌詞同步使用
            state.audioStartTime = state.audioContext.currentTime;
            state.audioDuration = state.audioBuffer.duration;

            state.source.start(0);
            state.isPlaying = true;

            ui.playIcon.classList.add('hidden'); ui.pauseIcon.classList.remove('hidden'); ui.playText.textContent = '暫停';
            state.source.onended = () => { stopAudio(); if(state.isRecording) stopRecording(); };
        }

        function stopAudio() {
            if (!state.isPlaying) return;
            if (state.isSimulationMode) {
                state.isPlaying = false;
                state.currentProgress = 0;
                ui.playIcon.classList.remove('hidden'); ui.pauseIcon.classList.add('hidden'); 
                ui.playText.textContent = '播放模擬';
                return;
            }
            state.source.stop(); state.source.disconnect(); state.isPlaying = false;
            state.currentProgress = 0; // 停止時重置歌詞進度
            ui.playIcon.classList.remove('hidden'); ui.pauseIcon.classList.add('hidden'); ui.playText.textContent = '播放';
        }

        ui.playBtn.addEventListener('click', () => { state.isPlaying ? stopAudio() : playAudio(); });

        // ==========================================
        // 5. 動畫迴圈與模擬演算法
        // ==========================================
        function generateMockAudioData() {
            const timeSec = performance.now() / 1000;
            const bps = state.bpm / 60; 
            const beatPhase = (timeSec * bps) % 1; 
            
            let kick = 0;
            if (beatPhase < 0.25) {
                kick = Math.pow(1 - (beatPhase / 0.25), 2) * 255;
            }

            let snare = 0;
            if (beatPhase >= 0.5 && beatPhase < 0.75) {
                snare = Math.pow(1 - ((beatPhase - 0.5) / 0.25), 2) * 200;
            }

            const step16 = (timeSec * bps * 4) % 1;
            let hihat = 0;
            if (step16 < 0.2) {
                hihat = Math.pow(1 - (step16 / 0.2), 2) * 120;
            }

            const length = state.dataArray.length;
            for (let i = 0; i < length; i++) {
                const dropOff = Math.max(0, 1 - (i / length)); 
                const baseWave = (Math.sin(timeSec * 5 + i * 0.1) * 0.5 + 0.5) * 30; 
                const noise = Math.random() * 20;

                let val = baseWave + noise;

                if (i < length * 0.15) {
                    val += kick;
                } else if (i < length * 0.5) {
                    val += snare;
                } else {
                    val += hihat;
                }

                state.dataArray[i] = Math.min(255, val * dropOff);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            let bass = 0, mid = 0, treble = 0, volume = 0;

            if (state.isPlaying) {
                // 更新播放進度 (Progress) 供歌詞滾動使用
                if (state.isSimulationMode) {
                    generateMockAudioData();
                    state.simTime += 0.016; // 假設 60fps
                    state.currentProgress = (state.simTime / 180) % 1; // 模擬模式每 3 分鐘(180秒)重置循環
                } else if (state.analyser) {
                    state.analyser.getByteFrequencyData(state.dataArray);
                    if (state.audioContext && state.audioDuration) {
                        state.currentProgress = (state.audioContext.currentTime - state.audioStartTime) / state.audioDuration;
                        state.currentProgress = Math.max(0, Math.min(1, state.currentProgress)); // 限制在 0~1
                    }
                }
                
                const length = state.dataArray.length;
                let bassSum = 0, midSum = 0, trebleSum = 0;
                for(let i=0; i<length; i++) {
                    const value = state.dataArray[i];
                    volume += value;
                    if(i < length * 0.1) bassSum += value;
                    else if(i < length * 0.5) midSum += value;
                    else trebleSum += value;
                }
                
                bass = bassSum / (length * 0.1) / 255;
                mid = midSum / (length * 0.4) / 255;
                treble = trebleSum / (length * 0.5) / 255;
                volume = (volume / length) / 255;

                if (state.bassHitTimer > 0) state.bassHitTimer--;
                if (state.isAutoMode && bass > 0.88 && state.bassHitTimer === 0) {
                    state.bassHitTimer = 120;
                    let nextScene = state.currentScene;
                    while(nextScene === state.currentScene) nextScene = Math.floor(Math.random() * 13);
                    switchScene(nextScene);
                }

                state.hueOffset += treble * 0.05 * state.effectIntensity;
                pointLight.color.setHSL((state.hueOffset % 1.0), 0.8, 0.5);
            }

            // 平滑移動特效主群組位置
            masterGroup.position.x += (dragControl.targetX - masterGroup.position.x) * 0.1;
            masterGroup.position.y += (dragControl.targetY - masterGroup.position.y) * 0.1;

            const vBass = bass * state.effectIntensity;
            const hue = state.hueOffset % 1.0;
            const invHue = (state.hueOffset + 0.5) % 1.0;

            if (state.currentScene === 0) {
                particlesMesh.rotation.y += 0.001 + (treble * 0.02 * state.effectIntensity);
                particlesMesh.rotation.x += 0.0005;
                particlesMesh.scale.setScalar(1 + vBass * 0.8);
                particlesMaterial.color.setHSL(hue, 0.8, 0.6);
            } else if (state.currentScene === 1) {
                icosahedronMesh.rotation.x += 0.01; icosahedronMesh.rotation.y += 0.01;
                icosahedronMesh.scale.lerp(new THREE.Vector3(1 + vBass * 2, 1 + vBass * 2, 1 + vBass * 2), 0.1);
                icosahedronMaterial.emissive.setHSL(hue, 1.0, Math.min(1, vBass * 0.8));
                icosahedronMaterial.color.setHSL(invHue, 0.8, 0.5);
                camera.position.x = (Math.random() - 0.5) * vBass * 3;
                camera.position.y = (Math.random() - 0.5) * vBass * 3;
            } else if (state.currentScene === 2) {
                groups[2].rotation.z += 0.01 + (treble * 0.05 * state.effectIntensity);
                rings.forEach((ring, index) => {
                    ring.position.z += 0.5 + (volume * 3 * state.effectIntensity);
                    if(ring.position.z > 10) ring.position.z = -ringsCount * 10;
                    ring.material.opacity = Math.min(1, (ring.position.z + (ringsCount * 10)) / 100);
                    ring.material.color.setHSL(((hue + (index*0.02)) % 1.0), 1.0, 0.4 + (vBass*0.4));
                    const ringScale = 1 + (state.dataArray[index % state.dataArray.length]/255)*0.8*state.effectIntensity;
                    ring.scale.setScalar(ringScale);
                });
            } else if (state.currentScene === 3) {
                groups[3].rotation.z += 0.005;
                groups[3].rotation.x = Math.sin(Date.now()*0.001) * 0.5;
                spectrumBars.forEach((bar, i) => {
                    const dataVal = (state.dataArray[i*2] / 255) * state.effectIntensity;
                    bar.scale.y = 1 + dataVal * 15;
                    bar.material.color.setHSL((hue + i/64) % 1.0, 1.0, 0.5);
                    bar.material.emissiveIntensity = dataVal * 2;
                });
            } else if (state.currentScene === 4) {
                terrainMesh.position.z += 0.2 + (vBass * 0.5);
                if(terrainMesh.position.z > 20) terrainMesh.position.z = 0;
                const positions = terrainGeo.attributes.position.array;
                for(let i=0; i<positions.length; i+=3) {
                    const index = Math.floor((i/3) % (state.dataArray.length/2));
                    const dataVal = (state.dataArray[index] / 255) * state.effectIntensity;
                    positions[i+2] = dataVal * 12; 
                }
                terrainGeo.attributes.position.needsUpdate = true;
                terrainMat.color.setHSL(hue, 1.0, 0.5);
                terrainMat.emissive.setHSL(invHue, 1.0, vBass * 0.6);
            } else if (state.currentScene === 5) {
                groups[5].rotation.x += 0.01; groups[5].rotation.y += 0.02;
                groups[5].scale.setScalar(1 + vBass * 1.5);
                spikes.forEach((spike, i) => {
                    const dataVal = (state.dataArray[i*4] / 255) * state.effectIntensity;
                    spike.scale.y = 1 + dataVal * 2;
                    spike.material.color.setHSL((hue + i/40) % 1.0, 1.0, 0.5);
                });
            } else if (state.currentScene === 6) {
                groups[6].rotation.y += 0.02 + (mid * 0.1 * state.effectIntensity);
                groups[6].rotation.z = Math.sin(Date.now()*0.002) * 0.3;
                helixSpheres.forEach((sphere, i) => {
                    const dataVal = (state.dataArray[i] / 255) * state.effectIntensity;
                    sphere.scale.setScalar(1 + dataVal * 2.5);
                    sphere.material.color.setHSL(hue, 1.0, 0.4 + dataVal*0.4);
                });
            } else if (state.currentScene === 7) {
                groups[7].rotation.x += 0.005; groups[7].rotation.y += 0.01;
                matrixCubes.forEach((cube, i) => {
                    const dataVal = (state.dataArray[i % state.dataArray.length] / 255) * state.effectIntensity;
                    cube.scale.setScalar(0.5 + dataVal * 2);
                    cube.rotation.x += dataVal * 0.1; cube.rotation.y += dataVal * 0.1;
                    cube.material.color.setHSL((hue + dataVal) % 1.0, 1.0, 0.5);
                });
            } else if (state.currentScene === 8) {
                gyroRings.forEach((ring, i) => {
                    ring.rotation.x += 0.01 * (i+1) + (treble * 0.05 * state.effectIntensity);
                    ring.rotation.y += 0.015 * (5-i) + (mid * 0.05 * state.effectIntensity);
                    ring.scale.setScalar(1 + (vBass * 0.2 * (i+1)));
                    ring.material.color.setHSL((hue + i/5) % 1.0, 1.0, 0.5);
                });
            } else if (state.currentScene === 9) {
                starburstLines.rotation.z += 0.01; starburstLines.rotation.y += 0.005;
                const pos = starburstGeo.attributes.position.array;
                const currentScale = 1 + (vBass * 3);
                for(let i=0; i<200; i++) {
                    const dataVal = (state.dataArray[i]/255)*state.effectIntensity;
                    const baseR = 20 * currentScale * (dataVal + 0.2);
                    const theta = Math.atan2(pos[i*6+4], pos[i*6+3]);
                    const phi = Math.acos(pos[i*6+5] / Math.sqrt(pos[i*6+3]**2 + pos[i*6+4]**2 + pos[i*6+5]**2) || 1);
                    pos[i*6+3] = baseR * Math.sin(phi) * Math.cos(theta);
                    pos[i*6+4] = baseR * Math.sin(phi) * Math.sin(theta);
                    pos[i*6+5] = baseR * Math.cos(phi);
                }
                starburstGeo.attributes.position.needsUpdate = true;
                starburstLines.material.color.setHSL(hue, 1.0, 0.6);
            } else if (state.currentScene === 10) {
                knotMesh.rotation.x += 0.01 + (mid * 0.05 * state.effectIntensity);
                knotMesh.rotation.y += 0.02 + (treble * 0.05 * state.effectIntensity);
                knotMesh.scale.setScalar(1 + vBass * 1.5);
                knotMesh.material.color.setHSL(invHue, 1.0, 0.5);
                knotMesh.material.emissive.setHSL(hue, 1.0, Math.min(1, vBass * 0.7));
            } else if (state.currentScene === 11) {
                groups[11].rotation.y += 0.05 + (volume * 0.1 * state.effectIntensity);
                groups[11].position.y = Math.sin(Date.now()*0.001) * 5 * vBass;
                vortexMesh.scale.setScalar(1 + vBass * 0.8);
                vortexMesh.material.color.setHSL(hue, 0.9, 0.6);
            } else if (state.currentScene === 12) {
                groups[12].rotation.y = Math.sin(Date.now()*0.0005) * 0.5;
                groups[12].rotation.x = Math.sin(Date.now()*0.001) * 0.2;
                discs.forEach((disc, i) => {
                    const dataVal = (state.dataArray[i*8] / 255)*state.effectIntensity;
                    disc.rotation.z += 0.01 + dataVal*0.1;
                    disc.position.y = (i - 3.5) * (4 + vBass * 5);
                    disc.scale.setScalar(1 + dataVal * 0.5);
                    disc.material.color.setHSL((hue + i/8) % 1.0, 1.0, 0.5);
                });
            }
            
            if (state.currentScene !== 1) camera.position.lerp(new THREE.Vector3(0, 0, 50), 0.1);
            
            // 歌詞與攝影機位置同步 (防震動)，並隨背景全域變色
            textSprite.position.x = camera.position.x;
            textSprite.position.y = camera.position.y;
            textSprite.material.color.setHSL(hue, 0.9, 0.7);

            // 僅在進度更新或文字改變時，重新繪製滾動歌詞畫布，大幅節省效能
            if (state.lastRenderedProgress !== state.currentProgress || state.textDirty) {
                renderVisibleLyrics(state.currentProgress);
                state.lastRenderedProgress = state.currentProgress;
                state.textDirty = false;
            }

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 6. 影片錄製與 FFmpeg 轉檔 MP4
        // ==========================================
        let mediaRecorder;
        let recordedChunks = [];
        let ffmpeg = null;

        async function startRecording() {
            if(!state.isPlaying) playAudio();

            recordedChunks = [];
            
            const canvasStream = renderer.domElement.captureStream(60);
            const tracks = [...canvasStream.getTracks()];

            if (!state.isSimulationMode && state.mediaStreamDestination) {
                tracks.push(...state.mediaStreamDestination.stream.getTracks());
            } else if (state.isSimulationMode) {
                alert("【系統提示】您目前處於無音樂模擬模式。\n\n導出的 MP4 將「不包含」聲音，僅會保留您所看到的 3D 視覺特效畫面與字幕。");
            }

            const combinedStream = new MediaStream(tracks);
            const options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 10000000 };
            try { mediaRecorder = new MediaRecorder(combinedStream, options); } 
            catch (e) { mediaRecorder = new MediaRecorder(combinedStream); }

            mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) recordedChunks.push(event.data); };
            mediaRecorder.onstop = async () => { await processVideo(); };

            mediaRecorder.start();
            state.isRecording = true;
            showStatus('錄製中...');

            ui.recordInner.classList.remove('rounded-full', 'w-4', 'h-4');
            ui.recordInner.classList.add('rounded-sm', 'w-6', 'h-6');
            ui.recordCircle.classList.add('animate-pulse');
            ui.recordText.textContent = '停止錄製';
        }

        function stopRecording() {
            if (mediaRecorder && state.isRecording) {
                mediaRecorder.stop();
                state.isRecording = false;
                ui.recordInner.classList.remove('rounded-sm', 'w-6', 'h-6');
                ui.recordInner.classList.add('rounded-full', 'w-4', 'h-4');
                ui.recordCircle.classList.remove('animate-pulse');
                ui.recordText.textContent = '開始錄製';
            }
        }

        ui.recordBtn.addEventListener('click', () => { state.isRecording ? stopRecording() : startRecording(); });

        async function processVideo() {
            const webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
            ui.loadingOverlay.classList.remove('hidden'); ui.loadingOverlay.style.display = 'flex';
            
            try {
                if (!ffmpeg) {
                    ffmpeg = new window.FFmpegWASM.FFmpeg();
                    ffmpeg.on('log', ({ message }) => console.log(message));
                }
                if (!ffmpeg.loaded) {
                    ui.loadingText.textContent = '正在載入轉碼引擎 (需時較長，請稍候)...';
                    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                    const ffmpegBaseURL = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd';
                    const toBlobURL = window.FFmpegUtil.toBlobURL;
                    
                    await ffmpeg.load({
                        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                        classWorkerURL: await toBlobURL(`${ffmpegBaseURL}/814.ffmpeg.js`, 'text/javascript')
                    });
                }

                ui.loadingText.textContent = '正在寫入暫存檔案...';
                await ffmpeg.writeFile('input.webm', await window.FFmpegUtil.fetchFile(webmBlob));

                ui.loadingText.textContent = '正在將畫面轉碼為 MP4 (高品質輸出)，請耐心等候...';
                
                await ffmpeg.exec([
                    '-i', 'input.webm', 
                    '-c:v', 'libx264', 
                    '-preset', 'fast', 
                    '-crf', '18', 
                    '-pix_fmt', 'yuv420p', 
                    '-vf', 'scale=trunc(iw/2)*2:trunc(ih/2)*2', 
                    '-c:a', 'aac', 
                    '-b:a', '320k', 
                    'output.mp4'
                ]);

                ui.loadingText.textContent = '轉碼完成！準備下載...';
                const data = await ffmpeg.readFile('output.mp4');
                const mp4Blob = new Blob([data], { type: 'video/mp4' });

                downloadBlob(mp4Blob, 'music_visualizer.mp4');
                await ffmpeg.deleteFile('input.webm'); await ffmpeg.deleteFile('output.mp4');

            } catch (error) {
                console.error("FFmpeg 轉檔失敗:", error);
                alert("前端 MP4 轉碼失敗，系統已為您自動降級導出原始的 WebM 影片檔案！");
                downloadBlob(webmBlob, 'music_visualizer.webm');
            } finally {
                ui.loadingOverlay.classList.add('hidden'); ui.loadingOverlay.style.display = 'none';
                showStatus('錄製與導出完成！');
            }
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none'; a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
        }

    </script>
</body>
